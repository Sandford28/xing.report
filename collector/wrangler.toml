# xing.report WAIT-TIME collector (worker A) — scheduled Cloudflare Worker.
# Fetches the CBP and CBSA border wait-time feeds (+ the daily FX rate) every
# 5 minutes and archives every reading in D1. Deliberately lean so the core
# archive is never starved by the heavier alerts worker. Knows nothing about
# web pages.
#
# Deploy: npm run deploy:waits    (or: wrangler deploy)
# The alerts/weather half is a separate worker — see wrangler.alerts.toml.

name = "xing-collector"
main = "src/waits.js"
compatibility_date = "2026-07-01"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "xing-report"
database_id = "7f5e4bde-de8d-43b2-8707-b752d05766d7"

[observability]
enabled = true
