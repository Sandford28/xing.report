<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>xing.report — detroit–windsor border waits</title>
<style>
/* ============ palette — DESIGN-SPEC §1 ============ */
:root {
  --paper: #F2F1ED;
  --ink: #141414;
  --hairline: #C9C7C2;
  --muted: #6B6963;
  --receded: #A5A29B;
  --moving: #008A43;
  --slow-fill: #F5A300;   --slow-text: #141414;
  --backed-fill: #E8291C; --backed-text: #FFFFFF;
  --accent: #0E71B8;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #121212;
    --ink: #EDEBE6;
    --hairline: #3A3A38;
    --muted: #99968F;
    --receded: #6E6C66;
    --moving: #3FD37F;
    --slow-fill: #FFAF1F;   --slow-text: #121212;
    --backed-fill: #FF6047; --backed-text: #121212;
    --accent: #4BA3DC;
  }
}

/* ============ base — §2, §3 ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 20px;
  text-transform: lowercase; /* everything lowercase, no exceptions */
}
main { max-width: 480px; margin: 0 auto; padding: 16px; }

/* ============ wordmark — §4 ============ */
header {
  border-bottom: 2px solid var(--ink);
  padding: 16px;
}
.wordmark {
  display: flex; align-items: center; gap: 8px;
  font-size: 20px; font-weight: 700;
}
.wordmark svg { display: block; }
.wordmark .tld { font-weight: 400; color: var(--accent); } /* the accent — once, here, nowhere else */

/* ============ stale warning strip — §5 ============ */
#stale {
  display: none;
  background: var(--slow-fill); color: var(--slow-text);
  font-weight: 700; padding: 16px;
}
#stale.show { display: block; }

/* ============ direction toggle — §5, tap targets §3 ============ */
.toggle {
  display: grid; grid-template-columns: 1fr 1fr;
  border: 2px solid var(--ink);
  margin-bottom: 16px;
}
.toggle button {
  height: 56px;
  font: 700 15px/16px "Helvetica Neue", Helvetica, Arial, sans-serif;
  text-transform: lowercase;
  background: none; color: var(--ink);
  border: none; cursor: pointer;
}
.toggle button:first-child { border-right: 2px solid var(--ink); }
.toggle button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }

/* ============ crossing card ============ */
.card { border: 2px solid var(--ink); padding: 24px; margin-bottom: 16px; }
.bridge { font-size: 28px; line-height: 32px; font-weight: 700; margin-bottom: 16px; }

.lane-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; line-height: 16px; font-weight: 400;
  letter-spacing: 0.08em; color: var(--muted);
}
.lane-label svg { color: var(--ink); }

/* the hero numeral — nothing renders larger (§2, §5) */
.hero-row { display: flex; align-items: baseline; gap: 16px; margin: 8px 0; flex-wrap: wrap; }
.numeral {
  font-size: 96px; line-height: 91px; font-weight: 700;
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em; white-space: nowrap;
}
.unit { font-size: 16px; font-weight: 400; color: var(--muted); }

/* signal field — always contains its word (§1) */
.signal { font-size: 20px; padding: 8px 16px; }
.s-moving { color: var(--moving); font-weight: 400; padding: 8px 0; } /* calm is quiet: no fill */
.s-slow { background: var(--slow-fill); color: var(--slow-text); font-weight: 700; }
.s-backed { background: var(--backed-fill); color: var(--backed-text); font-weight: 700; }
.s-closed { background: var(--ink); color: var(--paper); font-weight: 700; }

/* trend — one word, always (§5) */
.trend { font-size: 15px; line-height: 16px; }
.t-climbing { font-weight: 700; color: var(--ink); }
.t-easing, .t-steady { font-weight: 400; color: var(--receded); }

/* secondary lanes: car · nexus (§2 nexus numeral) */
.minor { display: flex; gap: 24px; }
.minor > div { flex: 1; }
.minor .numeral { font-size: 40px; line-height: 40px; letter-spacing: 0; }
.minor .hero-row { gap: 8px; }

.rule { border: none; border-top: 1px solid var(--hairline); margin: 16px 0; }

/* alert strip — one line per card (§5). with an incident: ink field, paper
   text, 700. without: recedes. unavailable: recedes, and says so. */
.alert-line {
  background: var(--ink); color: var(--paper); font-weight: 700;
  padding: 8px 16px; margin-bottom: 16px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.alert-none {
  color: var(--receded); font-weight: 400; margin-bottom: 16px;
}

/* the two clocks — plain language, told apart by wording */
.fresh { color: var(--muted); }

/* hand-maintained facts: tolls, hazmat */
.facts { font-size: 15px; line-height: 20px; }
.facts .label {
  font-size: 13px; line-height: 16px; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 8px;
}
.facts .unverified { color: var(--receded); }

/* gordie howe status */
.status-headline { font-size: 28px; line-height: 32px; font-weight: 700; margin-bottom: 8px; }
.status-note { margin-bottom: 8px; }
.as-of { font-size: 13px; line-height: 16px; color: var(--muted); }

/* email signup — glove-sized targets, hard edges */
.signup { margin-top: 16px; }
.signup input[type="email"] {
  display: block; width: 100%; height: 56px; padding: 0 16px;
  font: 400 15px "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: var(--ink); background: var(--paper);
  border: 2px solid var(--ink); border-radius: 0;
  margin-bottom: 8px;
}
.signup button {
  display: block; width: 100%; height: 56px;
  font: 700 15px "Helvetica Neue", Helvetica, Arial, sans-serif;
  text-transform: lowercase;
  color: var(--paper); background: var(--ink);
  border: none; border-radius: 0; cursor: pointer;
}
.signup .hp { display: none; }
.signup-msg { margin-top: 8px; }

footer {
  max-width: 480px; margin: 0 auto; padding: 0 16px 24px;
  font-size: 13px; line-height: 16px; color: var(--muted);
}
</style>
</head>
<body>

<header>
  <span class="wordmark">
    <!-- ✕ mark: two crossed bars at ±45° (§4) -->
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
      <g fill="currentColor">
        <rect x="1" y="8.5" width="22" height="7" transform="rotate(45 12 12)"/>
        <rect x="1" y="8.5" width="22" height="7" transform="rotate(-45 12 12)"/>
      </g>
    </svg>
    xing<span class="tld">.report</span>
  </span>
</header>

<div id="stale"></div>

<main>
  <nav class="toggle" aria-label="direction">
    <button id="btn-to_canada" aria-pressed="true">det → win</button>
    <button id="btn-to_us" aria-pressed="false">win → det</button>
  </nav>
  <div id="cards"><div class="fresh">loading…</div></div>
  <!-- rendered once, outside the 30s re-render, so typing in the signup
       form is never wiped by a refresh -->
  <div id="gordie"></div>
</main>

<footer>
  wait times: u.s. customs and border protection · canada border services agency<br>
  road alerts: ontario 511 · mdot mi drive<br>
  weather alerts: u.s. national weather service · environment and climate change canada<br>
  exchange rate: bank of canada daily rate<br>
  checked every 5 minutes
</footer>

<script>
'use strict';

// ---- pictograms — §3: 48×30, 2.5 stroke, no fill, currentColor ----
const PICTO = {
  truck: '<svg width="48" height="30" viewBox="0 0 48 30" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><rect x="2" y="6" width="26" height="15"/><path d="M28 11 h9 l7 7 v3 h-16 z"/><circle cx="11" cy="25" r="3"/><circle cx="37" cy="25" r="3"/></svg>',
  car: '<svg width="48" height="30" viewBox="0 0 48 30" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M5 22 v-4 l7 -2 5 -6 h11 l6 6 h9 v6"/><circle cx="14" cy="24" r="3"/><circle cx="35" cy="24" r="3"/></svg>',
  nexus: '<svg width="48" height="30" viewBox="0 0 48 30" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M24 3 L38 15 L24 27 L10 15 Z"/></svg>',
};

// ---- status thresholds — §5, keyed to the truck wait ----
function statusOf(wait) {
  if (wait === null || wait === undefined) return null;
  if (wait < 20) return { word: 'moving', cls: 's-moving' };
  if (wait < 60) return { word: 'slow', cls: 's-slow' };
  return { word: 'backed up', cls: 's-backed' };
}

const TREND_MARK = { climbing: '▲', easing: '▼', steady: '—' };

let data = null;
let direction = 'to_canada'; // det → win

function lane(readings, category, type) {
  return readings.find((r) => r.direction === direction && r.lane_category === category && r.lane_type === type);
}

function minsAgo(iso) {
  return Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 60000));
}

// clock time as a driver would say it, in the corridor's timezone
function clock(iso) {
  return new Intl.DateTimeFormat('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Detroit',
  }).format(new Date(iso)).toLowerCase();
}

function trendHtml(r) {
  if (!r || !r.trend) return '';
  return `<div class="trend t-${r.trend}">${TREND_MARK[r.trend]} ${r.trend}</div>`;
}

function numeralHtml(r) {
  if (r.wait_minutes === null) return `<span class="numeral">–</span>`;
  return `<span class="numeral">${r.wait_minutes}</span><span class="unit">min</span>`;
}

function minorLaneHtml(r, picto, label) {
  if (!r) return '';
  return `<div>
    <div class="lane-label">${PICTO[picto]}${label}</div>
    <div class="hero-row">${numeralHtml(r)}</div>
    ${trendHtml(r)}
  </div>`;
}

// which town each side's alerts speak for, per crossing
const SIDE_LABELS = {
  'ambassador-bridge': { ca: 'windsor', us: 'detroit' },
  'detroit-windsor-tunnel': { ca: 'windsor', us: 'detroit' },
  'blue-water-bridge': { ca: 'sarnia', us: 'port huron' },
};

const DIR_ABBR = { northbound: 'nb', southbound: 'sb', eastbound: 'eb', westbound: 'wb' };

// one strip line per card. priority: full closures first (api pre-sorts),
// then the newest. more than one alert becomes "+ n more".
function alertLineText(a, slug) {
  const place = (SIDE_LABELS[slug] || {})[a.side] || '';
  if (a.event_type === 'weather') {
    return `${place} weather: ${a.title}`;
  }
  const road = (a.roadway || '').toLowerCase();
  const dir = DIR_ABBR[(a.direction_of_travel || '').toLowerCase()] || '';
  const what = a.is_full_closure ? 'all lanes closed'
    : (a.lanes_affected || a.event_type || '').toLowerCase();
  if (road) return `${road} ${dir}`.trim() + ` (${place}): ${what}`;
  return `${place}: ${(a.title || what)}`;
}

function alertStripHtml(crossing) {
  // never claim "no incidents" unless our alert collection is actually current
  const checked = data.alerts_checked_at ? minsAgo(data.alerts_checked_at) : null;
  if (checked === null || checked > 15) {
    return `<div class="alert-none">incident reports unavailable</div>`;
  }
  const alerts = crossing.alerts || [];
  if (!alerts.length) return `<div class="alert-none">no incidents</div>`;
  const more = alerts.length > 1 ? ` +${alerts.length - 1} more` : '';
  return `<div class="alert-line">${alertLineText(alerts[0], crossing.slug)}${more}</div>`;
}

// the two clocks, told apart in plain words:
// one says how old the border's own reading is, the other says when WE last checked.
function freshHtml(readings) {
  const src = readings.find((r) => r.lane_category === 'commercial' && r.direction === direction)
           || readings.find((r) => r.direction === direction);
  if (!src) return '';
  const lines = [];
  if (src.feed_updated_at) {
    lines.push(`the border reported this wait at ${clock(src.feed_updated_at)}`);
  } else {
    lines.push(`the border gave no time for this reading`);
  }
  const checked = minsAgo(src.fetched_at);
  lines.push(`we checked for updates ${checked === 0 ? 'just now' : `${checked} min ago`}`);
  return `<div class="fresh">${lines.join('<br>')}</div>`;
}

function money(n) {
  return '$' + n.toFixed(2);
}

function shortDate(iso) {
  if (!iso) return '';
  return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' })
    .format(new Date(iso + 'T00:00:00Z')).toLowerCase();
}

// tolls: the operator's real posted prices wherever they exist; a currency
// the operator doesn't post is calculated at the bank of canada rate and
// marked "≈" as our estimate. returns [html, usedEstimate].
function tollLine(row) {
  const parts = [];
  let estimated = false;
  if (row.usd !== null && row.usd !== undefined) parts.push(`${money(row.usd)} usd`);
  if (row.cad !== null && row.cad !== undefined) parts.push(`${money(row.cad)} cad`);
  else if (row.usd !== null && data.usd_cad) {
    parts.push(`≈${money(row.usd * data.usd_cad.rate)} cad`);
    estimated = true;
  }
  const note = row.note ? ` (${row.note})` : '';
  const asOf = row.as_of ? ` <span class="as-of">· posted ${shortDate(row.as_of)}</span>` : '';
  return [`${row.label} — ${parts.join(' · ')}${note}${asOf}`, estimated];
}

// hazmat is safety information: verified-with-date or explicitly unverified,
// never guessed, never silently absent.
function hazmatLine(hazmat) {
  if (hazmat && hazmat.status) {
    return `<div>hazmat: ${hazmat.status} <span class="as-of">· verified ${shortDate(hazmat.last_verified)}</span></div>`;
  }
  return `<div class="unverified">hazmat rules: not yet verified — check with the crossing operator</div>`;
}

function factsHtml(info) {
  if (!info) return '';
  let rows = '';
  if (info.tolls) {
    rows += `<div class="label">tolls</div>`;
    let anyEstimate = false;
    for (const r of info.tolls.rows) {
      const [line, estimated] = tollLine(r);
      anyEstimate = anyEstimate || estimated;
      rows += `<div>${line}</div>`;
    }
    if (anyEstimate && data.usd_cad) {
      rows += `<div class="as-of">≈ is our estimate at the bank of canada rate of ${shortDate(data.usd_cad.date)} — not a posted price</div>`;
    }
  }
  rows += hazmatLine(info.hazmat);
  return `<hr class="rule"><div class="facts">${rows}</div>`;
}

function gordieCardHtml(g) {
  if (!g || !g.status) return '';
  return `<section class="card">
    <h2 class="bridge">gordie howe bridge</h2>
    <div class="status-headline">${g.status.headline}</div>
    <div class="status-note">${g.status.note}</div>
    <div class="as-of">as of ${shortDate(g.status.as_of)}</div>
    <hr class="rule">
    <div class="facts">${hazmatLine(g.hazmat)}</div>
    <hr class="rule">
    <form class="signup" id="signup">
      <div class="facts" style="margin-bottom:8px">get one email when the bridge opens. nothing else.</div>
      <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off">
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" aria-label="email address">
      <button type="submit">email me when it opens</button>
      <div class="signup-msg" id="signup-msg"></div>
    </form>
  </section>`;
}

function bindSignup() {
  const form = document.getElementById('signup');
  if (!form) return;
  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const msg = document.getElementById('signup-msg');
    const button = form.querySelector('button');
    button.disabled = true;
    msg.textContent = 'saving…';
    try {
      const res = await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          email: form.elements.email.value,
          website: form.elements.website.value,
        }),
      });
      const out = await res.json();
      if (out.ok) {
        form.innerHTML = '<div class="facts">you’re on the list — one email when it opens.</div>';
      } else {
        msg.textContent = out.error || 'something went wrong — try again';
        button.disabled = false;
      }
    } catch {
      msg.textContent = 'could not reach the server — try again';
      button.disabled = false;
    }
  });
}

function cardHtml(crossing) {
  const truck = lane(crossing.readings, 'commercial', 'standard');
  const car = lane(crossing.readings, 'passenger', 'standard');
  const nexus = lane(crossing.readings, 'passenger', 'nexus');
  if (!truck && !car) return '';

  let hero = '';
  if (truck) {
    const s = truck.wait_minutes === null
      ? { word: (truck.status_text || 'closed'), cls: 's-closed' }
      : statusOf(truck.wait_minutes);
    hero = `
      <div class="lane-label">${PICTO.truck}truck</div>
      <div class="hero-row">
        ${numeralHtml(truck)}
        <span class="signal ${s.cls}">${s.word}</span>
      </div>
      ${trendHtml(truck)}
      <hr class="rule">`;
  }

  const minors = [minorLaneHtml(car, 'car', 'car'), minorLaneHtml(nexus, 'nexus', 'nexus')]
    .filter(Boolean).join('');

  return `<section class="card">
    <h2 class="bridge">${crossing.name}</h2>
    ${alertStripHtml(crossing)}
    ${hero}
    ${minors ? `<div class="minor">${minors}</div><hr class="rule">` : ''}
    ${freshHtml(crossing.readings)}
    ${factsHtml(crossing.info)}
  </section>`;
}

function render() {
  if (!data) return;

  // phase 0: the ambassador bridge card. more crossings join this list in phase 1.
  const show = ['ambassador-bridge'];
  document.getElementById('cards').innerHTML = data.crossings
    .filter((c) => show.includes(c.slug))
    .map(cardHtml)
    .join('') || '<div class="fresh">no data available</div>';

  // warning strip fires on OUR pipeline falling behind (collector runs every
  // 5 min), not on the agencies' own slower clocks — keeps the warning meaningful.
  const newest = Math.min(
    ...data.crossings.flatMap((c) => c.readings.map((r) => minsAgo(r.fetched_at)))
  );
  const strip = document.getElementById('stale');
  if (newest > 10) {
    strip.textContent = `warning — our last successful data check was ${newest} min ago. numbers may be out of date.`;
    strip.className = 'show';
  } else {
    strip.className = '';
  }

  for (const dir of ['to_canada', 'to_us']) {
    document.getElementById('btn-' + dir).setAttribute('aria-pressed', String(dir === direction));
  }

  // once only — see the comment on #gordie
  const gordie = document.getElementById('gordie');
  if (!gordie.innerHTML && data.gordie_howe) {
    gordie.innerHTML = gordieCardHtml(data.gordie_howe);
    bindSignup();
  }
}

for (const dir of ['to_canada', 'to_us']) {
  document.getElementById('btn-' + dir).addEventListener('click', () => {
    direction = dir;
    render();
  });
}

async function refresh() {
  const res = await fetch('/api/now');
  if (res.ok) data = await res.json();
  render();
}

refresh().catch(() => {
  document.getElementById('cards').innerHTML = '<div class="fresh">could not load data — try reloading</div>';
});
setInterval(() => refresh().catch(() => {}), 60000); // new numbers land every 5 min; check each minute
setInterval(render, 30000); // keep "we checked x min ago" honest between fetches
</script>
</body>
</html>
